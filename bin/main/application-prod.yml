# ==============================================
# 운영 환경 설정 (application-prod.yml)
# ==============================================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:mysql://localhost:3306/korean_fortune?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:fortune_user}
    password: ${DB_PASSWORD:fortune_secure_2025!}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: false
        use_sql_comments: false

server:
  port: 8080
  tomcat:
    max-threads: 200
    min-spare-threads: 10

app:
  fortune:
    ai:
      enabled: ${AI_ENABLED:false}  # 환경변수로 제어
      provider: ${AI_PROVIDER:openai}
    cache:
      enabled: true
      ttl: 7200 # 2시간
    security:
      enabled: true

# 운영환경 로깅
logging:
  level:
    com.fortune: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    org.springframework.ai: WARN
    root: WARN
  file:
    name: /app/logs/korean-fortune.log
    max-size: 100MB
    max-history: 30

# 운영환경 모니터링
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true
