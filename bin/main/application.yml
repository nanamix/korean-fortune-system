# ==============================================
# 기본 설정 (application.yml)
# ==============================================
spring:
  application:
    name: korean-fortune-system
  
  profiles:
    active: dev

  # 데이터베이스 설정 (H2 인메모리 DB)
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    format-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  # H2 콘솔 설정
  h2:
    console:
      enabled: true
      path: /h2-console

  # 캐시 설정 (Caffeine만 사용)
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=1h

  # AI 설정 (기본적으로 비활성화)
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:not-set}

# 서버 설정
server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      force: true

# 운세 애플리케이션 설정
app:
  fortune:
    ai:
      enabled: false  # 기본적으로 AI 비활성화
      provider: openai
    cache:
      enabled: true
      ttl: 3600
    security:
      enabled: false  # 개발시 보안 비활성화

# 로깅 설정
logging:
  level:
    com.fortune: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.ai: WARN  # AI 로그 최소화
    org.springframework.web.servlet.resource.ResourceHttpRequestHandler: WARN  # 정적 리소스 로그 최소화
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/korean-fortune.log

# Actuator 설정
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

# API 문서 설정 (Spring Boot 3.5.3 호환)
springdoc:
  api-docs:
    path: /api-docs
    enabled: false  # 호환성 문제로 임시 비활성화
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    docExpansion: none
    enabled: false  # 호환성 문제로 임시 비활성화
  packages-to-scan: com.fortune.controller
  paths-to-match: /api/**
  # Spring Boot 3.5.3과 호환성 문제로 임시 비활성화
