# ==============================================
# 개발 환경 설정 (application-dev.yml)
# ==============================================
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:devdb
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

app:
  fortune:
    ai:
      enabled: false # 개발환경에서는 AI 비활성화
    security:
      enabled: false
    cache:
      enabled: true

logging:
  level:
    com.fortune: DEBUG
    root: INFO
