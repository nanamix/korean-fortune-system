plugins {
    id 'java'
    id 'org.springframework.boot' version '3.5.3'
    id 'io.spring.dependency-management' version '1.1.6'
}

group = 'com.fortune'
version = '1.0.0'
sourceCompatibility = '17'

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

repositories {
    mavenCentral() // Maven Central 저장소 추가
}

dependencies {
    // Spring Boot 기본
    implementation 'org.springframework.boot:spring-boot-starter-web'

    // JPA & Database
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'mysql:mysql-connector-java:8.0.33'
    implementation 'com.h2database:h2:2.2.224'

    // Security
    implementation 'org.springframework.boot:spring-boot-starter-security'

    // Cache
    implementation 'org.springframework.boot:spring-boot-starter-cache'

    // Validation
    implementation 'org.springframework.boot:spring-boot-starter-validation'

    // Lombok
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    // JSON Processing
    implementation 'com.fasterxml.jackson.core:jackson-databind'

    // SpringDoc OpenAPI (Swagger) for Spring Boot 3.x
    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.2.0'
    implementation 'io.swagger.core.v3:swagger-annotations:2.2.15'

    // Actuator (헬스체크)
    implementation 'org.springframework.boot:spring-boot-starter-actuator'

    // Test
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.security:spring-security-test'
}

tasks.named('test') {
    useJUnitPlatform()
}

// JAR 빌드 설정
jar {
    enabled = false
    archiveBaseName = 'korean-fortune-system'
    archiveVersion = '1.0.0'
}

bootJar {
    archiveBaseName = 'korean-fortune-system'
    archiveVersion = '1.0.0'
    mainClass = 'com.fortune.KoreanFortuneApplication'
}

// Java 컴파일 옵션
compileJava {
    options.encoding = 'UTF-8'
    options.compilerArgs += ['-parameters']
}

// 테스트 설정
test {
    useJUnitPlatform()
    testLogging {
        events "passed", "skipped", "failed"
        exceptionFormat "full"
    }
}

// 개발 환경 설정
bootRun {
    jvmArgs = ['-Dspring.profiles.active=dev']
    systemProperty 'file.encoding', 'UTF-8'
    systemProperty 'user.timezone', 'Asia/Seoul'
}

task dockerBuild(type: Exec, dependsOn: bootJar) {
    group = 'docker'
    description = 'Docker 이미지 빌드'
    commandLine '/usr/local/bin/docker', 'build', '-f', 'docker/Dockerfile', '-t', 'korean-fortune-system:latest', '.'
}

task devRun(type: org.springframework.boot.gradle.tasks.run.BootRun) {
    group = 'application'
    description = '개발 환경에서 애플리케이션 실행'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'com.fortune.KoreanFortuneApplication'
    systemProperty 'spring.profiles.active', 'dev'
    systemProperty 'server.port', '8080'
}

task prodJar(type: org.springframework.boot.gradle.tasks.bundling.BootJar) {
    group = 'build'
    description = '운영 환경용 JAR 빌드'
    archiveClassifier = 'prod'
    mainClass = 'com.fortune.KoreanFortuneApplication'

    doLast {
        println "운영 환경용 JAR 빌드 완료: ${archiveFile.get()}"
    }
}

task testReport(type: TestReport) {
    group = 'verification'
    description = '테스트 결과 리포트 생성'
    destinationDirectory = file("$buildDir/reports/tests")
    testResults.from test
}

task dependencyUpdates {
    group = 'help'
    description = '업데이트 가능한 의존성 확인'
    doLast {
        println '의존성 업데이트 확인을 위해 ./gradlew dependencyUpdates 실행'
    }
}

task dockerComposeUp(type: Exec) {
    group = 'docker'
    description = 'docker-compose를 사용하여 컨테이너를 시작합니다.'
    commandLine '/usr/local/bin/docker-compose', '-f', 'docker/docker-compose.yaml', 'up', '-d'
}

task dockerComposeDown(type: Exec) {
    group = 'docker'
    description = 'docker-compose를 사용하여 컨테이너를 중지합니다.'
    commandLine '/usr/local/bin/docker-compose', '-f', 'docker/docker-compose.yaml', 'down'
}
