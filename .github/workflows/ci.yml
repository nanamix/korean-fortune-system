# 🔮 한국형 만세력 운세 시스템 — 통합 CI/CD 파이프라인
# build-and-test → docker → deploy 를 needs 로 연결한 단일 파이프라인.
#   - PR / develop·master push : build-and-test
#   - master push (또는 workflow_dispatch) : docker(GHCR) → deploy(SSH)
name: CI/CD

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

# 같은 ref 의 동시 실행 직렬화 — latest 태그 푸시/배포 경쟁 방지.
concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  JAVA_VERSION: '21'

jobs:
  # ──────────────────────────────────────────────────────────────
  # 1. BUILD & TEST — 모든 push / PR
  # ──────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: corretto
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build & test
        run: ./gradlew build --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: build/reports/tests/
          retention-days: 7

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v6
        with:
          name: app-jar
          path: build/libs/korean-fortune-app.jar
          retention-days: 1

  # ──────────────────────────────────────────────────────────────
  # 2. DOCKER BUILD & PUSH — master push / dispatch (테스트 통과 후)
  # ──────────────────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.ref_name }}

      - name: Print image digest
        run: echo "Image digest ${{ steps.build.outputs.digest }}"

  # ──────────────────────────────────────────────────────────────
  # 3. DEPLOY — master push / dispatch (Docker 게시 후, SSH)
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: [self-hosted, macOS, x64]
    needs: docker
    if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
    environment:
      name: production
      url: ${{ vars.APP_URL }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Notify deploy started
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_CICD_WEBHOOK_URL }}
        run: |
          set -eu
          [ -n "$DISCORD_WEBHOOK_URL" ] || { echo "Discord webhook not configured"; exit 0; }
          payload=$(jq -n --arg title "Deploy started" --arg url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" '{embeds:[{title:$title,url:$url,color:16776960,fields:[{name:"Step",value:"Deploy to Production",inline:true},{name:"Commit",value:(env.GITHUB_SHA[0:12]),inline:true}]}]}')
          curl --fail --silent --show-error --max-time 10 -H 'Content-Type: application/json' --data "$payload" "$DISCORD_WEBHOOK_URL"

      - name: Deploy via SSH
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_CICD_WEBHOOK_URL }}
        run: |
            set -e
            notify_step() {
              [ -n "$DISCORD_WEBHOOK_URL" ] || return 0
              local step="$1" result="$2"
              local color=16776960
              [ "$result" = "success" ] && color=3066993
              [ "$result" = "failure" ] && color=15158332
              payload=$(jq -n --arg step "$step" --arg result "$result" --arg url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" --argjson color "$color" '{embeds:[{title:("Deploy step: " + $step),url:$url,color:$color,fields:[{name:"Result",value:$result,inline:true}]}]}')
              curl --fail --silent --show-error --max-time 10 -H 'Content-Type: application/json' --data "$payload" "$DISCORD_WEBHOOK_URL" || true
            }
            notify_step "GHCR 로그인" "started"
            echo "🔐 Logging in to GitHub Container Registry..."
            echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            notify_step "GHCR 로그인" "success"

            notify_step "최신 이미지 Pull" "started"
            echo "📥 Pulling latest image..."
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            notify_step "최신 이미지 Pull" "success"

            cd "${{ vars.DEPLOY_PATH || '/Users/nanamix/Dev/korean-fortune-system' }}"
            notify_step "기존 컨테이너 중지·정리" "started"
            echo "🛑 Stopping existing containers..."
            docker compose -f docker/docker-compose.yaml -f docker/docker-compose.prod.yaml -f docker/docker-compose.openbao.override.yml down --remove-orphans || true
            # 이전 Compose 프로젝트가 남긴 고정 이름 컨테이너 정리
            for container in korean-fortune-redis korean-fortune-openbao-secrets korean-fortune-prometheus korean-fortune-standalone korean-fortune-elasticsearch korean-fortune-mysql korean-fortune-grafana; do
              docker rm -f "$container" 2>/dev/null || true
            done
            # 다른 Compose 프로젝트가 점유한 호스트 포트도 정리
            for port in 6379 3306 18080 3000 9090 9200; do
              docker ps --filter "publish=$port" -q | xargs -r docker rm -f || true
            done
            notify_step "기존 컨테이너 중지·정리" "success"

            notify_step "신규 컨테이너 시작" "started"
            echo "🚀 Starting updated containers..."
            if ! docker compose -f docker/docker-compose.yaml -f docker/docker-compose.prod.yaml -f docker/docker-compose.openbao.override.yml up -d; then
              echo "❌ 컨테이너 시작 실패 — openbao-secrets 로그"
              docker compose -f docker/docker-compose.yaml -f docker/docker-compose.prod.yaml -f docker/docker-compose.openbao.override.yml logs --tail=100 openbao-secrets || true
              notify_step "신규 컨테이너 시작" "failure"
              exit 1
            fi
            notify_step "신규 컨테이너 시작" "success"

            notify_step "애플리케이션 헬스체크" "started"
            echo "⏳ Waiting for application to become healthy..."
            HEALTH_URL="http://localhost:18080/actuator/health"
            MAX_RETRIES=20
            RETRY_INTERVAL=10
            for i in $(seq 1 $MAX_RETRIES); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || true)
              if [ "$STATUS" = "200" ]; then
                echo "✅ Application is healthy (attempt $i/$MAX_RETRIES)"
                notify_step "애플리케이션 헬스체크" "success"
                break
              fi
              echo "⏳ Attempt $i/$MAX_RETRIES: status=$STATUS — retrying in ${RETRY_INTERVAL}s..."
              sleep $RETRY_INTERVAL
              if [ $i -eq $MAX_RETRIES ]; then
                echo "❌ Health check failed after $MAX_RETRIES attempts"
                notify_step "애플리케이션 헬스체크" "failure"
                docker compose -f docker/docker-compose.yaml -f docker/docker-compose.prod.yaml -f docker/docker-compose.openbao.override.yml logs --tail=50 app
                exit 1
              fi
            done

            docker compose -f docker/docker-compose.yaml -f docker/docker-compose.prod.yaml -f docker/docker-compose.openbao.override.yml ps
            echo "✅ Deployment complete!"

      - name: Notify deploy finished
        if: ${{ always() }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_CICD_WEBHOOK_URL }}
          DEPLOY_RESULT: ${{ job.status }}
        run: |
          set -eu
          [ -n "$DISCORD_WEBHOOK_URL" ] || { echo "Discord webhook not configured"; exit 0; }
          color=3066993
          [ "$DEPLOY_RESULT" = "success" ] || color=15158332
          payload=$(jq -n --arg title "Deploy finished: $DEPLOY_RESULT" --arg url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" --arg result "$DEPLOY_RESULT" --argjson color "$color" '{embeds:[{title:$title,url:$url,color:$color,fields:[{name:"Step",value:"Deploy to Production",inline:true},{name:"Result",value:$result,inline:true}]}]}')
          curl --fail --silent --show-error --max-time 10 -H 'Content-Type: application/json' --data "$payload" "$DISCORD_WEBHOOK_URL"

  # ──────────────────────────────────────────────────────────────
  # 4. DISCORD STATUS — master 배포 결과 알림
  # ──────────────────────────────────────────────────────────────
  deployment-status:
    name: Discord Deployment Status
    runs-on: ubuntu-latest
    needs: [build-and-test, docker, deploy]
    if: always() && github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Send deployment status to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_CICD_WEBHOOK_URL }}
          BUILD_RESULT: ${{ needs.build-and-test.result }}
          DOCKER_RESULT: ${{ needs.docker.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          set -eu
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_CICD_WEBHOOK_URL 미설정 — 배포 알림을 건너뜁니다."
            exit 0
          fi
          status="success"
          color=3066993
          if [ "$BUILD_RESULT" != "success" ] || [ "$DOCKER_RESULT" != "success" ] || [ "$DEPLOY_RESULT" != "success" ]; then
            status="failure"
            color=15158332
          fi
          payload=$(jq -n \
            --arg title "CI/CD deployment $status" \
            --arg description "${{ github.repository }} / ${{ github.ref_name }}" \
            --arg url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg sha "${GITHUB_SHA:0:12}" \
            --arg build "$BUILD_RESULT" \
            --arg docker "$DOCKER_RESULT" \
            --arg deploy "$DEPLOY_RESULT" \
            --argjson color "$color" \
            '{embeds:[{title:$title,description:$description,url:$url,color:$color,fields:[{name:"Build & Test",value:$build,inline:true},{name:"Docker",value:$docker,inline:true},{name:"Deploy",value:$deploy,inline:true},{name:"Commit",value:$sha,inline:false}]}]}')
          curl --fail --silent --show-error --max-time 10 \
            -H 'Content-Type: application/json' \
            --data "$payload" \
            "$DISCORD_WEBHOOK_URL"
