name: CI/CD Pipeline

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  JAVA_VERSION: '17'
  APP_VERSION: '2.6.0'

jobs:
  # ──────────────────────────────────────────────────────────────
  # 1. BUILD & TEST
  # ──────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'corretto'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew bootJar --no-daemon -x test

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/reports/tests/
          retention-days: 7

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/korean-fortune-app.jar
          retention-days: 1

  # ──────────────────────────────────────────────────────────────
  # 2. DOCKER BUILD & PUSH (master branch only)
  # ──────────────────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ env.APP_VERSION }}

  # ──────────────────────────────────────────────────────────────
  # 3. DEPLOYMENT NOTIFICATION (master branch only)
  # ──────────────────────────────────────────────────────────────
  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: docker
    if: always() && github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - name: Notify success
        if: needs.docker.result == 'success'
        run: |
          echo "✅ Docker image published to ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "🚀 Deploy with: docker compose -f docker/docker-compose.yaml -f docker/docker-compose.prod.yaml pull && docker compose -f docker/docker-compose.yaml -f docker/docker-compose.prod.yaml up -d"

      - name: Notify failure
        if: needs.docker.result != 'success'
        run: |
          echo "❌ CI/CD pipeline failed"
          exit 1
