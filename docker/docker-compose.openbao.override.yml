volumes:
  openbao_secrets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=1m,mode=0711

services:
  openbao-secrets:
    build:
      context: ..
      dockerfile: ops/openbao/Dockerfile
    container_name: korean-fortune-openbao-secrets
    restart: unless-stopped
    environment:
      OPENBAO_ADDR: ${OPENBAO_ADDR:-https://jyha-macbook-pro-2019.tail21796d.ts.net:8443}
      OPENBAO_EDGE_AUTH_MODE: ${OPENBAO_EDGE_AUTH_MODE:-tailscale}
      OPENBAO_HOLD_OPEN: "true"
      OPENBAO_BOOTSTRAP_DIR: /run/openbao-bootstrap
      OPENBAO_OUTPUT_DIR: /run/openbao-secrets
      OPENBAO_SECRET_PATH: ${OPENBAO_SECRET_PATH:-secret/data/projects/korean-fortune-system/prod}
      OPENBAO_REQUIRED_KEYS: MYSQL_ROOT_PASSWORD MYSQL_PASSWORD GRAFANA_PASSWORD JWT_SECRET
    volumes:
      - openbao_secrets:/run/openbao-secrets
      - ${OPENBAO_BOOTSTRAP_HOST_DIR:-/Users/nanamix/.config/korean-fortune-system/openbao-bootstrap}:/run/openbao-bootstrap:ro
    healthcheck:
      test: ["CMD", "test", "-f", "/run/openbao-secrets/.ready"]
      interval: 2s
      timeout: 1s
      retries: 15

  mysql:
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/openbao-secrets/MYSQL_ROOT_PASSWORD
      MYSQL_PASSWORD_FILE: /run/openbao-secrets/MYSQL_PASSWORD
    volumes:
      - openbao_secrets:/run/openbao-secrets:ro
    depends_on:
      openbao-secrets:
        condition: service_healthy

  app:
    environment:
      SPRING_CONFIG_IMPORT: configtree:/run/openbao-secrets/
    volumes:
      - openbao_secrets:/run/openbao-secrets:ro
    depends_on:
      openbao-secrets:
        condition: service_healthy

  grafana:
    environment:
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/openbao-secrets/GRAFANA_PASSWORD
    volumes:
      - openbao_secrets:/run/openbao-secrets:ro
    depends_on:
      openbao-secrets:
        condition: service_healthy
