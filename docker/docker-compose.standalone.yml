# ================================================================
# 🔮 한국형 만세력 운세 시스템 - 단독 실행 (Standalone)
# ================================================================
# 외부 DB/Redis 없이 H2 인메모리 DB로 빠르게 실행합니다.
# 개발 테스트 또는 데모 목적으로 사용하세요.
#
# 실행 방법:
#   docker compose -f docker/docker-compose.standalone.yml up -d
#
# 접속:
#   http://localhost:18080
# ================================================================

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
      target: runtime
    image: korean-fortune-system:local
    container_name: korean-fortune-standalone
    restart: unless-stopped
    ports:
      - "18080:18080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      APP_FORTUNE_AI_ENABLED: ${AI_ENABLED:-false}
      APP_FORTUNE_AI_PROVIDER: ${AI_PROVIDER:-openai}
      APP_FORTUNE_AI_MODEL: ${AI_MODEL:-gpt-5.4-mini}
      APP_FORTUNE_AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TZ: Asia/Seoul
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
