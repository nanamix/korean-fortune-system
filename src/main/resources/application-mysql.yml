# ==============================================
# 로컬 개발용 MySQL 설정 (application-mysql.yml)
# ==============================================
spring:
  config:
    activate:
      on-profile: mysql

  datasource:
    url: jdbc:mysql://localhost:3306/korean_fortune?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: fortune_user
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
