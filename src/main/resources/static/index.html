<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 한국형 만세력 운세 시스템</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: 2rem;
        }
        h1 {
            color: #333;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        .subtitle {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
        }
        .link {
            display: inline-block;
            padding: 1rem 2rem;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: transform 0.3s ease;
            font-weight: bold;
        }
        .link:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        .status {
            margin-top: 2rem;
            padding: 1rem;
            background: #e8f5e8;
            border-radius: 10px;
            color: #2d5a2d;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔮 한국형 만세력 운세 시스템</h1>
        <p class="subtitle">전통 사주팔자와 토정비결을 제공하는 한국형 운세 시스템</p>
        
        <div class="status">
            ✅ 서버가 정상적으로 실행 중입니다
        </div>
        
        <div class="links">
            <a href="/actuator/health" class="link">📊 시스템 상태 확인</a>
            <a href="/actuator" class="link">🔧 Actuator 관리</a>
            <a href="/api/docs" class="link">📚 API 문서</a>
            <a href="/api/docs/test" class="link">🧪 API 테스트</a>
            <a href="/api/fortune/saju/calculate" class="link">🔮 사주 계산 API</a>
        </div>
        
        <div style="margin-top: 2rem; color: #666; font-size: 0.9rem;">
            <p>버전: 2.5.0 | Spring Boot 3.5.3</p>
            <p>© 2025 Korean Fortune Team</p>
        </div>
    </div>
</body>
</html>
