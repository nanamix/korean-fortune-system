<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="사주팔자, 토정비결, 별자리 운세 등 전통 한국 운세 서비스">

    <title>🔮 한국형 만세력 운세 시스템</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Malgun Gothic', '맑은 고딕', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.97);
            padding: 3rem 2rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            max-width: 640px;
            width: 100%;
        }
        h1 { color: #333; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .subtitle { color: #666; font-size: 1rem; margin-bottom: 2rem; line-height: 1.6; }
        .main-cta {
            display: block;
            padding: 1.1rem 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 14px;
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .main-cta:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(102,126,234,0.45); }
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
            margin-bottom: 1.75rem;
        }
        .feature {
            background: linear-gradient(135deg, #f6f0ff 0%, #f0f4ff 100%);
            border: 1px solid #c3dafe;
            border-radius: 12px;
            padding: 0.85rem 0.5rem;
            font-size: 0.82rem;
            color: #5a67d8;
            font-weight: 600;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .feature:hover, .feature:focus-visible { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(90,103,216,.2); }
        .feature .emoji { font-size: 1.4rem; display: block; margin-bottom: 0.25rem; }
        .links {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            border-top: 1px solid #e2e8f0;
            padding-top: 1.25rem;
            margin-top: 0.5rem;
        }
        .link {
            display: inline-block;
            padding: 0.6rem 1.25rem;
            background: #f7f8fa;
            color: #5a67d8;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.88rem;
            font-weight: 600;
            transition: background 0.2s;
            border: 1px solid #e2e8f0;
        }
        .link:hover { background: #eef2ff; }
        .status {
            margin-bottom: 1.5rem;
            padding: 0.75rem 1rem;
            background: #f0fff4;
            border: 1px solid #9ae6b4;
            border-radius: 10px;
            color: #276749;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .footer { margin-top: 1.5rem; color: #a0aec0; font-size: 0.82rem; }
        @media (max-width: 480px) {
            h1 { font-size: 1.7rem; }
            .features { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>

        <div class="features">
            <a class="feature" href="/fortune-app.html#saju"><span class="emoji" aria-hidden="true">🔮</span>사주팔자</a>
            <a class="feature" href="/fortune-app.html#daily"><span class="emoji" aria-hidden="true">📅</span>오늘운세</a>
            <a class="feature" href="/fortune-app.html#tojeong"><span class="emoji" aria-hidden="true">📜</span>토정비결</a>

            <a class="feature" href="/fortune-app.html#calendar"><span class="emoji" aria-hidden="true">📆</span>간지달력</a>
            <a class="feature" href="/fortune-app.html#ai"><span class="emoji" aria-hidden="true">🤖</span>AI운세</a>
        </div>

        <div class="links">
            <a href="/fortune-app.html" class="link">🚀 운세 앱 바로가기</a>

        </div>
        <div style="margin-top: 2rem; color: #666; font-size: 0.9rem;">
            <p>버전 3.0.0 · 2026년 7월 업데이트</p>
            <p>© 2026 한국형 만세력 운세</p>
        </div>
    </div>
</body>
</html>
