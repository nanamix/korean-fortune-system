<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#667eea">
  <title>API 문서 · 한국형 만세력 운세</title>
  <style>
    :root { --primary:#667eea; --dark:#1a202c; --muted:#64748b; --line:#e2e8f0; --bg:#f5f7fb; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Malgun Gothic',sans-serif; color:var(--dark); background:var(--bg); }
    header { padding:2.6rem 1.2rem; color:#fff; background:linear-gradient(135deg,#667eea,#764ba2); }
    .wrap { width:min(100% - 2rem,1000px); margin:auto; }
    h1 { margin:0 0 .5rem; font-size:clamp(1.7rem,4vw,2.4rem); } header p { margin:0; opacity:.9; line-height:1.65; }
    nav { display:flex; gap:.5rem; flex-wrap:wrap; margin-top:1.2rem; } nav a { padding:.55rem .8rem; border-radius:9px; color:#fff; background:rgba(255,255,255,.16); text-decoration:none; font-size:.82rem; }
    main { padding:1.5rem 0 3rem; }
    .guide { padding:1rem; border:1px solid #c3dafe; border-radius:14px; background:#eef2ff; color:#3730a3; line-height:1.65; font-size:.85rem; }
    .summary { display:grid; grid-template-columns:repeat(3,1fr); gap:.7rem; margin:1rem 0; }
    .summary div,.section { padding:1rem; border:1px solid var(--line); border-radius:14px; background:#fff; box-shadow:0 5px 18px rgba(15,23,42,.05); }
    .summary span { display:block; color:var(--muted); font-size:.7rem; }.summary strong { display:block; margin-top:.25rem; overflow-wrap:anywhere; }
    .section { margin-top:.8rem; }.section h2 { margin:0 0 .8rem; font-size:1.05rem; }
    .endpoint { padding:.85rem 0; border-top:1px solid var(--line); }.endpoint:first-of-type { border-top:0; }
    .endpoint-head { display:flex; align-items:center; gap:.5rem; flex-wrap:wrap; }.method { padding:.25rem .5rem; border-radius:6px; color:#fff; font-size:.68rem; font-weight:800; }.GET { background:#2563eb; }.POST { background:#059669; }
    code { padding:.2rem .35rem; border-radius:5px; background:#f1f5f9; font-size:.76rem; overflow-wrap:anywhere; }.endpoint p { margin:.45rem 0 0; color:var(--muted); font-size:.8rem; line-height:1.55; }
    details { margin-top:.55rem; } summary { cursor:pointer; color:#4f46e5; font-size:.76rem; font-weight:700; } pre { padding:.8rem; overflow:auto; border-radius:9px; background:#111827; color:#e5e7eb; font-size:.68rem; line-height:1.55; }
    .error { padding:.55rem 0; border-top:1px solid var(--line); font-size:.78rem; }.error code { color:#b91c1c; }
    .loading,.load-error { padding:2rem; text-align:center; color:var(--muted); }.load-error { color:#b91c1c; }
    @media(max-width:640px) { .summary { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <header><div class="wrap"><h1>📚 한국형 만세력 운세 API 문서</h1><p>JSON은 화면 디자인이 아니라 프로그램끼리 데이터를 주고받는 형식입니다.<br>아래에서 각 API가 무엇을 요청하고 어떤 결과를 반환하는지 사람이 읽기 쉽게 확인할 수 있습니다.</p><nav><a href="/">← 처음 화면</a><a href="/fortune-app.html">운세 앱</a><a href="/api/docs/test">개발자 테스트 도구</a></nav></div></header>
  <main class="wrap">
    <div class="guide"><strong>읽는 방법</strong><br><b>GET</b>은 정보를 조회하고, <b>POST</b>는 생년월일 같은 입력값을 보내 계산을 요청합니다. 모든 응답의 <code>success</code>는 성공 여부, <code>data</code>는 실제 결과, <code>message</code>와 <code>errorCode</code>는 실패 이유를 뜻합니다.</div>
    <div id="docs"><div class="loading">API 문서를 불러오는 중입니다.</div></div>
  </main>
  <script>
    const escapeHtml = value => String(value ?? '').replace(/[&<>'"]/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
    fetch('/api/docs').then(response => {
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return response.json();
    }).then(response => renderDocs(response.data || {})).catch(error => {
      document.getElementById('docs').innerHTML = `<div class="load-error">문서를 불러오지 못했습니다: ${escapeHtml(error.message)}</div>`;
    });
    function renderDocs(docs) {
      const groups = Object.entries(docs.endpoints || {}).map(([group, endpoints]) => `<section class="section"><h2>${escapeHtml(group)}</h2>${Object.values(endpoints).map(renderEndpoint).join('')}</section>`).join('');
      const errors = Object.entries(docs.errorCodes || {}).map(([code, meaning]) => `<div class="error"><code>${escapeHtml(code)}</code> · ${escapeHtml(meaning)}</div>`).join('');
      document.getElementById('docs').innerHTML = `<div class="summary"><div><span>문서 버전</span><strong>${escapeHtml(docs.version || '-')}</strong></div><div><span>기본 주소</span><strong>${escapeHtml(location.origin)}</strong></div><div><span>API 그룹</span><strong>${Object.keys(docs.endpoints || {}).length}개</strong></div></div>${groups}<section class="section"><h2>공통 응답 구조</h2><pre>${escapeHtml(JSON.stringify(docs.responseFormat || {}, null, 2))}</pre></section><section class="section"><h2>오류 코드 의미</h2>${errors}</section><section class="section"><details><summary>프로그램용 원본 JSON 보기</summary><pre>${escapeHtml(JSON.stringify(docs, null, 2))}</pre></details></section>`;
    }
    function renderEndpoint(endpoint) {
      const method = String(endpoint.method || 'GET').toUpperCase();
      const extra = endpoint.requestBody || endpoint.parameters || endpoint.pathVariables;
      return `<article class="endpoint"><div class="endpoint-head"><span class="method ${escapeHtml(method)}">${escapeHtml(method)}</span><code>${escapeHtml(endpoint.url || '-')}</code></div><p>${escapeHtml(endpoint.description || '설명이 없습니다.')}</p>${extra ? `<details><summary>필요한 입력값 보기</summary><pre>${escapeHtml(JSON.stringify(extra, null, 2))}</pre></details>` : ''}</article>`;
    }
  </script>
</body>
</html>
