# ==============================================
# AI 활성화 환경 설정 (application-ai.yml)
# ==============================================
spring:
  config:
    activate:
      on-profile: ai

app:
  fortune:
    ai:
      enabled: true
      provider: ${APP_FORTUNE_AI_PROVIDER:deepseek}
      model: ${APP_FORTUNE_AI_MODEL:deepseek-chat}
      base-url: ${APP_FORTUNE_AI_BASE_URL:https://api.deepseek.com/v1}
      api-key: ${DEEPSEEK_API_KEY:${OPENAI_API_KEY:}}
      timeout: ${APP_FORTUNE_AI_TIMEOUT:30s}
      fallback-enabled: true

logging:
  level:
    com.fortune.ai: INFO
    com.fortune.service.AIFortuneService: DEBUG
