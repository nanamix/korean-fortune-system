spring:
  application:
    name: fortune-app
  profiles:
    active: dev
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
    deserialization:
      fail-on-unknown-properties: false
    time-zone: Asia/Seoul
  messages:
    basename: messages
    encoding: UTF-8
    cache-duration: 3600
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  name: Fortune Application
  version: 1.0.0
  description: JWT 기반 Spring Boot 애플리케이션