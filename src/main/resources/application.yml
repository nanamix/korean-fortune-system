# ==============================================
# 기본 설정 (application.yml)
# ==============================================
spring:
  application:
    name: korean-fortune-system
  
  profiles:
    active: dev

  # 데이터베이스 설정 (H2 인메모리 DB)
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    format-sql: true

  # H2 콘솔 설정
  h2:
    console:
      enabled: true
      path: /h2-console

  # 캐시 설정 (Caffeine만 사용)
  cache:
    type: caffeine

# 서버 설정
server:
  port: 18080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      force: true

# 운세 애플리케이션 설정
app:
  fortune:
    ai:
      enabled: false  # 기본적으로 AI 비활성화
      provider: fallback
      model: gpt-5.4-mini
      base-url: https://api.openai.com/v1
      api-key: ${OPENAI_API_KEY:}
      timeout: 30s
      fallback-enabled: true
    cache:
      enabled: true
      ttl: 3600
    security:
      enabled: false  # 개발시 보안 비활성화
    email:
      enabled: ${FORTUNE_EMAIL_ENABLED:false}
    telegram:
      bot-token: ${TELEGRAM_BOT_TOKEN:}
      chat-id: ${TELEGRAM_CHAT_ID:}
    discord:
      webhook-url: ${DISCORD_WEBHOOK_URL:}
    slack:
      webhook-url: ${SLACK_WEBHOOK_URL:}

# 로깅 설정 (traceId / spanId 포함)
logging:
  level:
    com.fortune: INFO
    com.fortune.ai: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.web.servlet.resource.ResourceHttpRequestHandler: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [trace=%X{traceId:-} span=%X{spanId:-}] - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [trace=%X{traceId:-} span=%X{spanId:-}] - %msg%n"
  file:
    name: logs/korean-fortune.log

# Actuator 설정
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,caches
  endpoint:
    health:
      show-details: always
  health:
    # 선택적 외부 의존성은 앱 liveness 를 가로막지 않도록 기본 비활성.
    # 메일(SMTP)은 옵션 기능, Redis 는 valkey 프로파일에서만 사용(거기서 재활성).
    mail:
      enabled: false
    redis:
      enabled: false
  info:
    env:
      enabled: true
  # Micrometer Tracing (OpenTelemetry 브리지)
  tracing:
    sampling:
      probability: 1.0  # 개발 환경: 전체 샘플링
    enabled: true
  otlp:
    metrics:
      export:
        enabled: false  # 기본 비활성화 (각 프로파일에서 활성화)
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:}  # 미설정 시 비활성화

# API 문서 설정
springdoc:
  api-docs:
    path: /api-docs
    enabled: false  # 자체 API 문서화 엔드포인트(/api/docs)를 사용
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    docExpansion: none
    enabled: false  # 자체 API 문서화 엔드포인트(/api/docs)를 사용
  packages-to-scan: com.fortune.controller
  paths-to-match: /api/**
