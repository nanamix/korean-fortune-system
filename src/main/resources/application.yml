spring:
  datasource:
    url: jdbc:mysql://localhost:3306/korean_fortune?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: fortune_user
    password: fortune_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  cache:
    type: simple

  # JSON 설정
  jackson:
    time-zone: Asia/Seoul
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

# Swagger/OpenAPI 설정
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    try-it-out-enabled: true
    filter: true
    syntaxHighlight:
      activated: true
      theme: monokai
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  paths-to-match: /api/**

# Actuator 설정
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

logging:
  level:
    com.fortune: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/korean-fortune.log

# 한국 시간대 설정
fortune:
  timezone: Asia/Seoul
  cache:
    ttl: 3600  # 1시간 캐시
  api:
    version: v1.0.0
    title: 한국형 만세력 운세 시스템
    description: 전통 사주학 기반의 종합 운세 서비스


---
# 개발 환경 설정
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:mysql://localhost:3306/korean_fortune_dev?useSSL=false&serverTimezone=Asia/Seoul

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

logging:
  level:
    com.fortune: DEBUG
    root: INFO

---
# 운영 환경 설정
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:mysql://prod-server:3306/korean_fortune_prod?useSSL=true&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

springdoc:
  swagger-ui:
    enabled: false  # 운영에서는 Swagger 비활성화
  api-docs:
    enabled: false

logging:
  level:
    com.fortune: INFO
    root: WARN
