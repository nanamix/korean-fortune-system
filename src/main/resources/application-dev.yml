# ==============================================
# 개발 환경 설정 (application-dev.yml)
# ==============================================
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:devdb
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

  # 이메일 설정 (개발환경에서 활성화)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME:}
    password: ${EMAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          timeout: 5000
          connectiontimeout: 5000

app:
  fortune:
    ai:
      enabled: false # 개발환경에서는 AI 비활성화
    security:
      enabled: false
    cache:
      enabled: true
    email:
      enabled: true # 개발환경에서 이메일 발송 활성화
    telegram:
      enabled: true # 개발환경에서 텔레그램 발송 활성화
      bot-token: ${TELEGRAM_BOT_TOKEN:}
      chat-id: ${TELEGRAM_CHAT_ID:}
      api-url: "https://api.telegram.org/bot"

logging:
  level:
    com.fortune: DEBUG
    io.micrometer.tracing: DEBUG  # 트레이싱 디버그 로그
    io.opentelemetry: DEBUG        # OpenTelemetry 디버그 로그
    root: INFO

# 개발 환경 추적 설정 (전체 샘플링 + OTEL 로깅)
management:
  tracing:
    sampling:
      probability: 1.0  # 개발: 모든 요청 추적
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:}  # 미설정 시 콘솔 로그로 대체
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,caches,trace

# 개발 환경에서 SpringDoc 설정 (호환성 문제로 비활성화)
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false
