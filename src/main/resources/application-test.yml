# ==============================================
# 테스트 환경 설정 (application-test.yml)
# ==============================================
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  sql:
    init:
      mode: never

app:
  fortune:
    ai:
      enabled: false # 테스트에서는 AI 비활성화
    cache:
      enabled: false # 테스트에서는 캐시 비활성화
    security:
      enabled: false

logging:
  level:
    com.fortune: WARN
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    org.springframework.ai: ERROR

# 테스트 환경에서 SpringDoc 비활성화 (성능 향상)
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false
