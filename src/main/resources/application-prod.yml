# ==============================================
# 운영 환경 설정 (application-prod.yml)
# ==============================================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:mysql://localhost:3306/korean_fortune?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:fortune_user}
    password: ${DB_PASSWORD:fortune_secure_2025!}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false

server:
  port: 18080
  tomcat:
    max-threads: 200
    min-spare-threads: 10

app:
  fortune:
    ai:
      enabled: ${APP_FORTUNE_AI_ENABLED:false}  # 환경변수로 제어
      provider: ${APP_FORTUNE_AI_PROVIDER:openai}
      model: ${APP_FORTUNE_AI_MODEL:gpt-5.4-mini}
      base-url: ${APP_FORTUNE_AI_BASE_URL:https://api.openai.com/v1}
      api-key: ${OPENAI_API_KEY:}
      timeout: ${APP_FORTUNE_AI_TIMEOUT:30s}
      fallback-enabled: true
    cache:
      enabled: true
      ttl: 7200 # 2시간
    security:
      enabled: true

# 운영환경 로깅 (traceId / spanId 포함)
logging:
  level:
    com.fortune: INFO
    com.fortune.ai: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    root: WARN
  file:
    name: /app/logs/korean-fortune.log
    max-size: 100MB
    max-history: 30

# 운영환경 모니터링 + OpenTelemetry 추적
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,caches
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true
  # 운영 환경: 10% 샘플링 (트래픽 부하 경감)
  tracing:
    sampling:
      probability: ${OTEL_SAMPLING_PROBABILITY:0.1}
  # OTLP 수집기 엔드포인트 (Jaeger / Grafana Tempo 등)
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4318/v1/traces}
