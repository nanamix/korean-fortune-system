# ==============================================
# 도커 환경 설정 (application-docker.yml)
# ==============================================
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:mysql://mysql:3306/korean_fortune?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${MYSQL_USER:fortune_user}
    password: ${MYSQL_PASSWORD}

server:
  port: 18080

logging:
  file:
    name: /app/logs/korean-fortune.log

app:
  fortune:
    ai:
      enabled: ${APP_FORTUNE_AI_ENABLED:false}
      provider: ${APP_FORTUNE_AI_PROVIDER:deepseek}
      model: ${APP_FORTUNE_AI_MODEL:deepseek-chat}
      base-url: ${APP_FORTUNE_AI_BASE_URL:https://api.openai.com/v1}
      api-key: ${OPENAI_API_KEY:}
      timeout: ${APP_FORTUNE_AI_TIMEOUT:30s}
      fallback-enabled: true
